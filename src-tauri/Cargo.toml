[package]
name = "engram-dashboard"
version = "0.1.0"
description = "Engram Dashboard"
authors = []
edition = "2021"

[lib]
name = "engram_dashboard_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "engram-dashboard"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }   # caret resolve(현재 2.11.2). Channel spike 검증 완료 — 최신 2.x 유지
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
uuid = { version = "1.8", features = ["v4", "serde"] }
tracing = "0.1"
base64 = "0.22"   # S12 raw 경계화: ChannelOutputSink(Embedded)가 raw→base64 인코딩(Tauri JSON Channel 제약)
thiserror = "1"   # discovery::DiscoveryError
dunce = "1"       # daemon exe 절대경로(canonicalize, UNC 회피) — WMI 는 상대경로면 RV=9
# S12 phase 1: pty/persistence/logging 코어가 이 crate 로 이동. Embedded 앱은 core 에 의존.
engram-dashboard-core = { path = "../crates/engram-dashboard-core" }
# discovery: daemon.json 공유 계약(DaemonInfo) + PROTOCOL_VERSION.
engram-dashboard-protocol = { path = "../crates/engram-dashboard-protocol" }

# 데몬 발견(discovery): WMI Win32_Process.Create(부모 Job 미상속 spawn) + PID 생존 판정(OpenProcess).
[target.'cfg(windows)'.dependencies]
windows = { version = "0.58", features = [
    "Win32_System_Threading",
    "Win32_Foundation",
    "Win32_System_Com",
    "Win32_System_Wmi",
    "Win32_System_Rpc",
    "Win32_System_Variant",
] }

# real_wmi_spawn_smoke(#[ignore] 통합테스트)에서 운영 data_dir(%APPDATA%) 경로 산출에만 사용.
# 운영 코드는 data_dir 을 호출자(lib.rs)가 주입하므로 dev-dependency 로 충분(런타임 의존 0).
[dev-dependencies]
dirs = "6"

# profile.release 는 workspace 루트(../Cargo.toml)로 이동(멤버에 두면 무시됨).
