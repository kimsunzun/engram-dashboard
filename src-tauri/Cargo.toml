[package]
name = "engram-dashboard"
version = "0.1.0"
description = "Engram Dashboard"
authors = []
edition = "2021"

[lib]
name = "engram_dashboard_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "engram-dashboard"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }   # caret resolve(현재 2.11.2). Channel spike 검증 완료 — 최신 2.x 유지
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
uuid = { version = "1.8", features = ["v4", "serde"] }
tracing = "0.1"
base64 = "0.22"   # S12 raw 경계화: embedded carrier(TauriChannelOutputSink)가 raw→base64 인코딩(Tauri JSON Channel 제약)
thiserror = "1"   # discovery::DiscoveryError
dunce = "1"       # daemon exe 절대경로(canonicalize, UNC 회피) — WMI 는 상대경로면 RV=9
# S12 phase 1: pty/persistence/logging 코어가 이 crate 로 이동. Embedded 앱은 core 에 의존.
engram-dashboard-core = { path = "../crates/engram-dashboard-core" }
# discovery: daemon.json 공유 계약(DaemonInfo) + PROTOCOL_VERSION.
engram-dashboard-protocol = { path = "../crates/engram-dashboard-protocol" }
# S13 sub-step 2: 순수 데몬 발견/spawn/stop 로직(crate::discovery 로 re-export). tray-host 와 공유.
engram-dashboard-discovery = { path = "../crates/engram-dashboard-discovery" }
# S12 ADR-0020 Stage 2: embedded 도 ConnectionCore(transport-중립 dispatch)를 거치게 한다.
# Tauri 어댑터(TauriOutboundSink/command loop)가 이 crate 의 ConnectionCore/OutboundSink/Outbound 를 호출.
engram-dashboard-daemon = { path = "../crates/engram-dashboard-daemon" }
# command loop task spawn + inbound mpsc + 단일 연결 conn 상태. Tauri 의 tokio runtime 위에서 돈다.
# (time/rt-multi-thread 는 테스트의 sleep 폴링 + #[tokio::test] 용 — 운영은 tauri::async_runtime 사용.)
tokio = { version = "1", features = ["rt", "rt-multi-thread", "sync", "macros", "time"] }
# ADR-0020 Stage 2 blocker: command loop dispatch panic 격리(FutureExt::catch_unwind, async).
# daemon 도 동일 버전(futures-util 0.3) 사용 — 좀비 연결 방지(panic 이 loop 를 죽이지 않게).
futures-util = "0.3"

# S13 sub-step 2: windows(WMI/COM)·dirs 는 discovery 로직이 engram-dashboard-discovery 로 이동하며
# 그 crate 로 옮겨갔다(src-tauri 잔여 코드는 windows API·dirs 직접 사용 0).
[dev-dependencies]
# embedded carrier conformance 테스트: TauriOutbound carrier wire(JSON) 파싱·단언.
serde_json = "1"

# profile.release 는 workspace 루트(../Cargo.toml)로 이동(멤버에 두면 무시됨).
