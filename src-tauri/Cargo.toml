[package]
name = "engram-dashboard"
version = "0.1.0"
description = "Engram Dashboard"
authors = []
edition = "2021"

[lib]
name = "engram_dashboard_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "engram-dashboard"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }   # caret resolve(현재 2.11.2). Channel spike 검증 완료 — 최신 2.x 유지
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1.8", features = ["v4", "serde"] }
tracing = "0.1"
# S12 phase 1: pty/persistence/logging 코어가 이 crate 로 이동. Embedded 앱은 core 에 의존.
engram-dashboard-core = { path = "../crates/engram-dashboard-core" }

# profile.release 는 workspace 루트(../Cargo.toml)로 이동(멤버에 두면 무시됨).
